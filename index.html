<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
#c{display:block;width:100vw;height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;color:#ffcc00;letter-spacing:4px}
#loading h2{font-size:28px;margin-bottom:6px}
#loading p{font-size:13px;color:#888;margin-bottom:20px}
#lbar{width:280px;height:5px;background:#222;border:1px solid #444}
#lbfill{height:100%;background:#ffcc00;width:0%;transition:width .3s}
#lerr{color:#ff4444;font-size:12px;margin-top:14px;display:none;max-width:360px;text-align:center;line-height:1.6}

/* MENU */
#menu{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
#menu h1{font-size:60px;color:#ffcc00;letter-spacing:10px;text-shadow:0 0 40px #ffcc0077;margin-bottom:4px}
#menu h3{color:#888;letter-spacing:5px;font-size:14px;margin-bottom:44px}
#menu button{padding:14px 52px;font:bold 18px 'Courier New';background:#ffcc00;color:#000;border:none;cursor:pointer;letter-spacing:3px;transition:all .15s}
#menu button:hover{background:#fff;transform:scale(1.06)}
.dmsg{color:#ff4444;font-size:15px;letter-spacing:2px;margin-bottom:18px;display:none}
.rmsg{color:#ffcc00;font-size:18px;letter-spacing:3px;margin-bottom:14px;display:none}
#controls{margin-top:28px;color:#555;font-size:11px;letter-spacing:1.5px;line-height:22px;text-align:center}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}

/* radar */
#rw{position:absolute;top:14px;left:14px}
#rc{border-radius:50%;border:2px solid #ffcc00;background:rgba(0,0,0,.65)}
#rl{text-align:center;font-size:9px;color:#ffcc0099;letter-spacing:2px;margin-top:3px}

/* scoreboard */
#sb{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:18px;background:rgba(0,0,0,.6);border:1px solid #ffcc0033;padding:7px 22px;font-size:13px;letter-spacing:2px;white-space:nowrap}
#sbt{color:#ff8844}#sbct{color:#44aaff}#sbsep{color:#ffcc00;font-size:16px}
#rt{color:#ffcc00;font-size:19px;font-weight:bold;min-width:46px;text-align:center}

/* killfeed */
#kf{position:absolute;top:56px;right:14px;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.ke{background:rgba(0,0,0,.6);padding:4px 10px;font-size:11px;letter-spacing:1px;border-left:3px solid #ffcc00;transition:opacity .5s}
.ke.fade{opacity:0}

/* status */
#st{position:absolute;bottom:22px;left:22px;display:flex;flex-direction:column;gap:8px}
.sr{display:flex;align-items:center;gap:9px;font-size:16px}
.si{font-size:20px}
.bw{width:150px;height:9px;background:#2a2a2a;border:1px solid #444}
.bf{height:100%;transition:width .25s}
#hpb{background:#e03333}#apb{background:#3366cc}
.sv{font-size:17px;font-weight:bold;min-width:34px;color:#ffcc00}

/* weapon */
#wi{position:absolute;bottom:22px;right:22px;text-align:right}
#wn{font-size:18px;letter-spacing:3px;color:#ffcc00;margin-bottom:2px}
#ad{font-size:30px;font-weight:bold;color:#fff}
#ar{font-size:13px;color:#777}
#rlt{font-size:16px;color:#ff4444;letter-spacing:3px;animation:blink .45s infinite;display:none}
@keyframes blink{50%{opacity:0}}

/* crosshair */
#xh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px}
#xh::before{content:'';position:absolute;width:20px;height:2px;background:#00ff55;top:-1px;left:-10px}
#xh::after{content:'';position:absolute;width:2px;height:20px;background:#00ff55;left:-1px;top:-10px}
#xhc{position:absolute;width:4px;height:4px;background:transparent;border:1px solid #00ff55;border-radius:50%;top:-2px;left:-2px}

/* hit */
#hm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;opacity:0;transition:opacity .08s}
#hm::before,#hm::after{content:'';position:absolute;width:10px;height:2px;background:#ffcc00;top:13px;left:9px}
#hm::before{transform:rotate(45deg)}
#hm::after{transform:rotate(-45deg)}

/* round msg */
#ro{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:30px;letter-spacing:5px;color:#ffcc00;text-shadow:0 0 18px #ffcc00;display:none;text-align:center;line-height:1.5}

/* bomb */
#bs{position:absolute;bottom:96px;left:50%;transform:translateX(-50%);font-size:13px;letter-spacing:2px;color:#ff4444;background:rgba(0,0,0,.65);padding:5px 16px;border:1px solid #ff4444;display:none}

/* plant progress */
#pp{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);width:200px;height:6px;background:#333;border:1px solid #ff4444;display:none}
#ppf{height:100%;background:#ff4444;width:0%}
</style>
</head>

<!-- MENU -->
<div id="menu">
  <h1>CS 1.6</h1>
  <h3>de_dust2</h3>
  <div class="dmsg" id="dmsg">YOU WERE ELIMINATED</div>
  <div class="rmsg" id="rmsg"></div>
  <button id="joinBtn">► JOIN GAME</button>
  <div id="controls">
    WASD — Move &nbsp;|&nbsp; Mouse — Aim &nbsp;|&nbsp; LMB — Shoot &nbsp;|&nbsp; R — Reload<br>
    Space — Jump &nbsp;|&nbsp; 1-5 — Weapons &nbsp;|&nbsp; Hold LMB with C4 — Plant &nbsp;|&nbsp; F — Defuse
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ═══════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8fa0a8);
scene.fog = new THREE.Fog(0x8fa0a8, 40, 130);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.05, 300);
const clock = new THREE.Clock();

// ═══════════════════════════════════════════════════════
//  LIGHTS
// ═══════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = sun.shadow.camera.bottom = -100;
sun.shadow.camera.right = sun.shadow.camera.top = 100;
sun.shadow.camera.far = 300;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x9ab0c8, 0x7a6040, 0.35));

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════
const controls = new PointerLockControls(camera, renderer.domElement);
scene.add(controls.getObject());

// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const PLAYER_H = 1.7, GRAVITY = 30, JUMP_STR = 10, MOVE_SPD = 8;
const BOT_SPD = 3.5, BOT_ATK = 25, BOT_DET = 32;
const WEAPON_NAMES = ['AK-47','HE GRENADE','SMOKE GRENADE','MOLOTOV','C4'];
const T_SPAWNS = [[-20,2,50],[-24,2,46],[-16,2,54],[-28,2,52],[-12,2,48]].map(v=>new THREE.Vector3(...v));
const CT_SPAWNS = [[20,2,-50],[24,2,-46],[16,2,-54],[28,2,-52],[12,2,-48]].map(v=>new THREE.Vector3(...v));
const WAYPOINTS = [[0,2,0],[15,2,20],[-15,2,20],[25,2,-10],[-25,2,-10],[10,2,-30],[-10,2,-30],[30,2,30],[-30,2,30],[0,2,40],[0,2,-40],[40,2,0],[-40,2,0]].map(v=>new THREE.Vector3(...v));

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let mapMeshes = [], mapLoaded = false;
let isAlive = false, gameActive = false;
let playerHP = 100, playerAP = 100;
let vel = new THREE.Vector3(), canJump = false, bobT = 0, moving = false;
let wIdx = 0, isReloading = false, reloadT = 0;
let ammo = { ak:30, akRes:90, he:2, smoke:2, mol:1, c4:1 };
let weaponGroup = new THREE.Group();
let muzzleFlash = null, muzzleT = 0;
const WP_BASE = new THREE.Vector3(0.35, -0.35, -0.7);
let bots = [], particles = [], grenades = [], fires = [];
let roundTime = 115, roundActive = false, roundOverT = 0;
let bombPlanted = false, bombT = 35, bombMesh = null, bombBeepT = 0, bombDefuseT = 0;
let plantT = 0, holdPlant = false;
const keys = {}, raycaster = new THREE.Raycaster();

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function lbar(v){ $('lbfill').style.width = v+'%'; }
function rnd(lo,hi){ return lo + Math.random()*(hi-lo); }

// ═══════════════════════════════════════════════════════
//  MAP — FALLBACK PROCEDURAL
// ═══════════════════════════════════════════════════════
function addBox(w,h,d,x,y,z,color=0xb89060){
  const g = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({color}));
  m.position.set(x,y,z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m); mapMeshes.push(m);
  return m;
}

function buildFallbackMap(){
  // Ground
  addBox(140,0.5,140, 0,-0.25,0, 0xc0a870);
  // Outer walls
  addBox(140,8,1,  0,4,-70, 0xb08050);
  addBox(140,8,1,  0,4, 70, 0xb08050);
  addBox(1,8,140, -70,4,  0, 0xb08050);
  addBox(1,8,140,  70,4,  0, 0xb08050);
  // Mid
  addBox(10,4,2,0,2,0,0x886644);
  addBox(2,4,10,4,2,5,0x886644);
  addBox(2,4,10,-4,2,-5,0x886644);
  // T-side corridor
  addBox(2,4,20, -14,2,38,0xaa8855);
  addBox(20,4,2, -14,2,28,0xaa8855);
  addBox(8,3,4,  -22,1.5,38,0x775533);
  addBox(4,3,8,  -30,1.5,28,0x775533);
  // CT-side corridor
  addBox(2,4,20,  14,2,-38,0xaa8855);
  addBox(20,4,2,  14,2,-28,0xaa8855);
  addBox(8,3,4,   22,1.5,-38,0x775533);
  addBox(4,3,8,   30,1.5,-28,0x775533);
  // A site
  addBox(5,3,5,  36,1.5,12,0x775533);
  addBox(10,4,2, 46,2,5,0xaa8855);
  addBox(3,3,3,  50,1.5,15,0x775533);
  addBox(15,1,15,42,0.5,18,0xc0a870);
  // B site
  addBox(5,3,5,  -36,1.5,-12,0x775533);
  addBox(10,4,2, -46,2,-5,0xaa8855);
  addBox(3,3,3,  -50,1.5,-15,0x775533);
  addBox(15,1,15,-42,0.5,-18,0xc0a870);
  // Ramps
  addBox(10,1,10, 30,0.5,30,0xc0a870);
  addBox(10,1,10,-30,0.5,-30,0xc0a870);
  // Mid pillars
  addBox(2,5,2, 0,2.5,20,0x886644);
  addBox(2,5,2, 0,2.5,-20,0x886644);
  mapLoaded = true;
}

// ═══════════════════════════════════════════════════════
//  MAP LOADING
// ═══════════════════════════════════════════════════════
function loadMap(){
  lbar(10);
  const loader = new GLTFLoader();
  const url = 'https://raw.githubusercontent.com/Stephan-bro/dust2-map/main/de_dust2_-_cs_map.glb';

  const fallback = () => {
    if(mapLoaded) return;
    $('lerr').style.display='block';
    $('lerr').textContent='Map file unavailable — using procedural dust2 layout.';
    buildFallbackMap();
    lbar(100);
    setTimeout(showMenu, 600);
  };
  const tOut = setTimeout(fallback, 14000);

  loader.load(url,
    gltf => {
      clearTimeout(tOut);
      if(mapLoaded) return;
      lbar(90);
      const map = gltf.scene;
      map.scale.set(5,5,5);
      const box = new THREE.Box3().setFromObject(map);
      map.position.sub(box.getCenter(new THREE.Vector3()));
      map.traverse(c => {
        if(c.isMesh){ c.castShadow=c.receiveShadow=true; mapMeshes.push(c); }
      });
      scene.add(map);
      mapLoaded = true;
      lbar(100);
      setTimeout(showMenu, 500);
    },
    xhr => { if(xhr.total) lbar(10+xhr.loaded/xhr.total*75); },
    () => { clearTimeout(tOut); fallback(); }
  );
}

function showMenu(){
  $('loading').style.display='none';
  $('menu').style.display='flex';
}

// ═══════════════════════════════════════════════════════
//  WEAPON MODELS
// ═══════════════════════════════════════════════════════
function mat(color, opts={}){ return new THREE.MeshLambertMaterial({color,...opts}); }
function bmat(color){ return new THREE.MeshBasicMaterial({color}); }

function makeAK47(){
  const g = new THREE.Group();
  const recv = new THREE.Mesh(new THREE.BoxGeometry(.08,.065,.38), mat(0x222222));
  g.add(recv);
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.011,.011,.32,6), mat(0x111111));
  barrel.rotation.x=Math.PI/2; barrel.position.set(0,.012,-.3); g.add(barrel);
  const sight = new THREE.Mesh(new THREE.BoxGeometry(.007,.022,.007), mat(0x111111));
  sight.position.set(0,.022,-.45); g.add(sight);
  const hguard = new THREE.Mesh(new THREE.BoxGeometry(.06,.042,.18), mat(0x3a2a15));
  hguard.position.set(0,-.01,-.14); g.add(hguard);
  const stock = new THREE.Mesh(new THREE.BoxGeometry(.058,.052,.2), mat(0x3a2a15));
  stock.position.set(0,-.004,.2); g.add(stock);
  const stockE = new THREE.Mesh(new THREE.BoxGeometry(.038,.072,.04), mat(0x1a1a1a));
  stockE.position.set(0,-.003,.31); g.add(stockE);
  const mag = new THREE.Mesh(new THREE.BoxGeometry(.048,.13,.06), mat(0x2a2a2a));
  mag.position.set(0,-.1,.02); mag.rotation.x=-.18; g.add(mag);
  const grip = new THREE.Mesh(new THREE.BoxGeometry(.038,.082,.042), mat(0x1e1e1e));
  grip.position.set(0,-.082,.1); g.add(grip);
  muzzleFlash = new THREE.Mesh(new THREE.SphereGeometry(.045,6,4), bmat(0xffee44));
  muzzleFlash.position.set(0,.012,-.47); muzzleFlash.visible=false; g.add(muzzleFlash);
  return g;
}

function makeHEGrenade(){
  const g=new THREE.Group();
  g.add(mkCyl(.038,.032,.14,8,0x4a5525));
  const s=mkCyl(.04,.04,.018,8,0xff2222);
  s.position.y=.03; g.add(s);
  const top=new THREE.Mesh(new THREE.SphereGeometry(.038,7,4),mat(0x4a5525));
  top.position.y=.07; top.scale.y=.65; g.add(top);
  const pin=mkCyl(.003,.003,.038,4,0xaaaaaa);
  pin.rotation.z=Math.PI/2; pin.position.set(.033,.09,0); g.add(pin);
  g.rotation.x=-.3; return g;
}

function makeSmokeGrenade(){
  const g=new THREE.Group();
  g.add(mkCyl(.04,.04,.18,8,0xaaaaaa));
  const s=mkCyl(.042,.042,.02,8,0x22aa22);
  s.position.y=.04; g.add(s);
  const pin=mkCyl(.003,.003,.038,4,0xbbbbbb);
  pin.rotation.z=Math.PI/2; pin.position.set(.033,.1,0); g.add(pin);
  g.rotation.x=-.3; return g;
}

function makeMolotov(){
  const g=new THREE.Group();
  const bm=mat(0x3a1c00,{transparent:true,opacity:.72});
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(.035,.04,.22,8),bm));
  const liq=new THREE.Mesh(new THREE.CylinderGeometry(.028,.034,.15,8),mat(0xff5500,{transparent:true,opacity:.6}));
  liq.position.y=-.03; g.add(liq);
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(.017,.034,.065,8),bm);
  neck.position.y=.14; g.add(neck);
  const rag=mkCyl(.015,.015,.04,6,0xddddcc);
  rag.position.y=.19; g.add(rag);
  for(let i=0;i<3;i++){
    const fl=new THREE.Mesh(new THREE.SphereGeometry(.01,4,3),bmat(0xff6600));
    fl.position.set(rnd(-.01,.01),.21+rnd(0,.015),rnd(-.01,.01));
    fl.userData.flame=true; fl.userData.baseY=fl.position.y; g.add(fl);
  }
  g.rotation.x=-.3; return g;
}

function makeC4(){
  const g=new THREE.Group();
  const tan=mat(0xc4a484), blk=mat(0x2a2a2a);
  g.add(mkBox(.12,.065,.22,0,0,-.04,tan));
  g.add(mkBox(.12,.065,.14,0,0,.1,tan));
  g.add(mkBox(.13,.01,.38,0,.036,0,blk));
  g.add(mkBox(.01,.075,.38,.052,0,0,blk));
  const timer=mkBox(.072,.026,.052,0,.047,.07,blk);
  g.add(timer);
  const scr=mkBox(.05,.014,.03,0,.062,.07,new THREE.MeshBasicMaterial({color:0x220000}));
  g.add(scr);
  [0xff2222,0x2244ff,0xffcc00].forEach((c,i)=>{
    const w=mkCyl(.003,.003,.12,4,c);
    w.rotation.x=-.5; w.position.set(-0.02+i*.02,.05,.01); g.add(w);
  });
  const blink=new THREE.Mesh(new THREE.SphereGeometry(.008,4,3),bmat(0xff2222));
  blink.position.set(.04,.066,.07); blink.name='c4l'; g.add(blink);
  return g;
}

function makeBot(isT){
  const g=new THREE.Group();
  const bc=isT?0x5a3a18:0x2a3a55, vc=isT?0x3a521a:0x1a1a2a, hc=0x111111;
  g.add(mkBox(.5,.72,.3,0,.86,0,mat(bc)));
  g.add(mkBox(.52,.5,.32,0,.9,0,mat(vc)));
  g.add(mkBox(.36,.36,.36,0,1.46,0,mat(isT?hc:0x2a2a38)));
  if(!isT){
    g.add(mkBox(.38,.15,.38,0,1.62,0,mat(0x111111)));
    g.add(mkBox(.32,.08,.17,0,1.5,-.18,mat(0x001133,{transparent:true,opacity:.7})));
  } else {
    g.add(mkBox(.22,.04,.01,0,1.48,-.18,new THREE.MeshBasicMaterial({color:0x221100})));
  }
  [-0.32,0.32].forEach(x=>{
    g.add(mkBox(.15,.62,.2,x,.85,0,mat(bc)));
    g.add(mkBox(.14,.18,.18,x,.5,0,mat(0xc8a07a)));
  });
  [-0.13,0.13].forEach(x=> g.add(mkBox(.2,.62,.25,x,.3,0,mat(bc))));
  g.add(mkBox(.05,.05,.36,-.28,.85,-.15,mat(0x111111)));
  g.traverse(c=>{if(c.isMesh){c.castShadow=true;c.userData.isBot=true;}});
  return g;
}

function mkBox(w,h,d,x,y,z,m){ const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m||mat(0x888888)); mesh.position.set(x,y,z); return mesh; }
function mkCyl(rt,rb,h,seg,color){ return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat(color)); }

// ═══════════════════════════════════════════════════════
//  FLOOR / WALL DETECTION
// ═══════════════════════════════════════════════════════
const downRC = new THREE.Raycaster();
function floorY(pos){
  downRC.set(new THREE.Vector3(pos.x,pos.y+1,pos.z), new THREE.Vector3(0,-1,0));
  downRC.far = 6;
  const h = downRC.intersectObjects(mapMeshes,true);
  return h.length ? h[0].point.y : -0.25;
}

const wallRC = new THREE.Raycaster();
function wallHit(pos,dir,dist){
  wallRC.set(new THREE.Vector3(pos.x,pos.y+.5,pos.z), dir.clone().normalize());
  wallRC.far = dist;
  return wallRC.intersectObjects(mapMeshes,true).length > 0;
}

// ═══════════════════════════════════════════════════════
//  WEAPON SWITCH
// ═══════════════════════════════════════════════════════
function switchWeapon(i){
  wIdx = i;
  camera.remove(weaponGroup);
  weaponGroup = new THREE.Group();
  weaponGroup.position.copy(WP_BASE);
  muzzleFlash = null;
  const models = [makeAK47,makeHEGrenade,makeSmokeGrenade,makeMolotov,makeC4];
  weaponGroup.add(models[i]());
  camera.add(weaponGroup);
  $('wn').textContent = WEAPON_NAMES[i];
  hudAmmo();
}

function hudAmmo(){
  const map={0:`${ammo.ak}<span style="font-size:16px;color:#777"> / ${ammo.akRes}</span>`,
             1:`${ammo.he}<span style="font-size:16px;color:#777"> / --</span>`,
             2:`${ammo.smoke}<span style="font-size:16px;color:#777"> / --</span>`,
             3:`${ammo.mol}<span style="font-size:16px;color:#777"> / --</span>`,
             4:`${ammo.c4}<span style="font-size:16px;color:#777"> / --</span>`};
  $('ad').innerHTML = map[wIdx]||'';
  $('rlt').style.display = (wIdx===0&&isReloading)?'block':'none';
}

// ═══════════════════════════════════════════════════════
//  SHOOT
// ═══════════════════════════════════════════════════════
function shoot(){
  if(!isAlive||!gameActive||isReloading) return;
  if(wIdx!==0){ throwGrenade(); return; }
  if(ammo.ak<=0){ reload(); return; }
  ammo.ak--;
  weaponGroup.position.z += .042;
  weaponGroup.rotation.x -= .09;
  if(muzzleFlash){ muzzleFlash.visible=true; muzzleT=.055; }
  raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
  const bMeshes=[];
  bots.forEach(b=>{ if(b.alive) b.mesh.traverse(c=>{if(c.isMesh)bMeshes.push(c);}); });
  const hits = raycaster.intersectObjects(bMeshes);
  if(hits.length){
    const h=hits[0], dist=h.distance;
    const dmg=Math.max(5,35*(1-dist/60));
    let hb=null;
    bots.forEach(b=>{ if(!b.alive)return; b.mesh.traverse(c=>{if(c===h.object)hb=b;}); });
    if(hb){ hb.hp-=dmg; hitmark(); if(hb.hp<=0)killBot(hb); }
    sparks(h.point);
  }
  hudAmmo();
}

function reload(){
  if(isReloading||wIdx!==0||ammo.akRes<=0) return;
  isReloading=true; reloadT=2.0; $('rlt').style.display='block';
}

function hitmark(){ const h=$('hm'); h.style.opacity='1'; setTimeout(()=>h.style.opacity='0',140); }

// ═══════════════════════════════════════════════════════
//  GRENADES
// ═══════════════════════════════════════════════════════
function throwGrenade(){
  const types=['','he','smoke','mol','c4'];
  const type=types[wIdx];
  if(!type) return;
  if(type==='he'&&ammo.he<=0)return;
  if(type==='smoke'&&ammo.smoke<=0)return;
  if(type==='mol'&&ammo.mol<=0)return;
  if(type==='c4'&&ammo.c4<=0)return;
  if(type==='he')ammo.he--;
  else if(type==='smoke')ammo.smoke--;
  else if(type==='mol')ammo.mol--;
  else ammo.c4--;

  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  const pos=controls.getObject().position.clone().addScaledVector(dir,.6);
  const mkMap={he:makeHEGrenade,smoke:makeSmokeGrenade,mol:makeMolotov,c4:makeC4};
  const mesh=mkMap[type](); mesh.position.copy(pos); scene.add(mesh);
  const gVel=dir.clone().multiplyScalar(18); gVel.y+=4;
  grenades.push({mesh,type,vel:gVel,timer:type==='he'?2:type==='smoke'?1.5:35,active:true});
  hudAmmo();
}

function updateGrenades(dt){
  for(let i=grenades.length-1;i>=0;i--){
    const gr=grenades[i];
    if(!gr.active){grenades.splice(i,1);continue;}
    gr.timer-=dt;
    gr.vel.y-=GRAVITY*.5*dt;
    const np=gr.mesh.position.clone().addScaledVector(gr.vel,dt);
    const fl=floorY(np);
    if(np.y<fl+.1){
      if(gr.type==='mol'){ spawnFire(np.clone()); scene.remove(gr.mesh); gr.active=false; continue; }
      np.y=fl+.1;
      gr.vel.y=Math.abs(gr.vel.y)*.38;
      gr.vel.x*=.65; gr.vel.z*=.65;
    }
    gr.mesh.position.copy(np);
    gr.mesh.rotation.x+=dt*4;
    if(gr.timer<=0){
      if(gr.type==='he') explodeHE(gr.mesh.position.clone());
      else if(gr.type==='smoke') smokeCloud(gr.mesh.position.clone());
      scene.remove(gr.mesh);
      gr.mesh.traverse(c=>{if(c.isMesh){c.geometry.dispose();c.material.dispose();}});
      gr.active=false;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
function addParticle(pos,vel,color,size,life,grav=true){
  if(particles.length>=500){
    const old=particles.shift();
    scene.remove(old.m); old.m.geometry.dispose(); old.m.material.dispose();
  }
  const m=new THREE.Mesh(new THREE.SphereGeometry(size,4,3),new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
  m.position.copy(pos); scene.add(m);
  particles.push({m,vel:vel.clone(),life,max:life,grav});
}

function sparks(pos){
  for(let i=0;i<6;i++) addParticle(pos.clone(),new THREE.Vector3(rnd(-3,3),rnd(1,4),rnd(-3,3)),0xffaa22,.018,.25);
}

function explodeHE(pos){
  addParticle(pos.clone(),new THREE.Vector3(0,0,0),0xffffff,2,.14,false);
  for(let i=0;i<55;i++){
    const v=new THREE.Vector3(rnd(-14,14),rnd(2,12),rnd(-14,14));
    addParticle(pos.clone(),v,Math.random()>.5?0xff6600:0x888888,rnd(.06,.14),rnd(1,2.5));
  }
  // damage
  const ep=pos;
  bots.forEach(b=>{ if(!b.alive)return; const d=b.mesh.position.distanceTo(ep); if(d<9){b.hp-=85*(1-d/9);if(b.hp<=0)killBot(b);} });
  const cp=controls.getObject().position; const pd=cp.distanceTo(ep);
  if(pd<9) playerHP-=85*(1-pd/9);
}

function smokeCloud(pos){
  for(let i=0;i<90;i++){
    const off=new THREE.Vector3(rnd(-2.5,2.5),rnd(0,2.5),rnd(-2.5,2.5));
    const vel=new THREE.Vector3(rnd(-.4,.4),.25+rnd(0,.4),rnd(-.4,.4));
    const m=new THREE.Mesh(new THREE.SphereGeometry(.45+Math.random()*.7,5,4),new THREE.MeshBasicMaterial({color:0x888888,transparent:true,opacity:.42}));
    m.position.copy(pos).add(off); scene.add(m);
    particles.push({m,vel,life:16,max:16,grav:false});
  }
}

function spawnFire(pos){
  const pud=new THREE.Mesh(new THREE.CircleGeometry(2.6,12),new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.6,side:THREE.DoubleSide}));
  pud.rotation.x=-Math.PI/2; pud.position.copy(pos); pud.position.y+=.05;
  scene.add(pud); fires.push({m:pud,timer:8,pos:pos.clone()});
  for(let i=0;i<65;i++){
    const off=new THREE.Vector3(rnd(-3.5,3.5),0,rnd(-3.5,3.5));
    const vel=new THREE.Vector3(rnd(-.4,.4),1.5+rnd(0,2),rnd(-.4,.4));
    addParticle(pos.clone().add(off),vel,Math.random()>.5?0xff6600:0xff2200,rnd(.06,.16),rnd(.8,1.6),false);
  }
}

function updateFires(dt){
  for(let i=fires.length-1;i>=0;i--){
    const f=fires[i]; f.timer-=dt;
    const cp=controls.getObject().position;
    if(cp.distanceTo(f.pos)<2.6) playerHP-=18*dt;
    bots.forEach(b=>{ if(!b.alive)return; if(b.mesh.position.distanceTo(f.pos)<2.6){b.hp-=14*dt;if(b.hp<=0)killBot(b);} });
    if(f.timer<=0){ scene.remove(f.m); f.m.geometry.dispose(); f.m.material.dispose(); fires.splice(i,1); }
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ scene.remove(p.m); p.m.geometry.dispose(); p.m.material.dispose(); particles.splice(i,1); continue; }
    if(p.grav) p.vel.y-=GRAVITY*.28*dt;
    p.m.position.addScaledVector(p.vel,dt);
    p.m.material.opacity=p.life/p.max;
  }
}

// ═══════════════════════════════════════════════════════
//  BOTS
// ═══════════════════════════════════════════════════════
const botRC=new THREE.Raycaster();

function spawnBots(){
  bots.forEach(b=>{ if(b.mesh) scene.remove(b.mesh); });
  bots=[];
  T_SPAWNS.forEach(sp=>{
    const m=makeBot(true); m.position.copy(sp); scene.add(m);
    bots.push({mesh:m,isT:true,hp:100,alive:true,state:'wander',wpIdx:Math.floor(Math.random()*WAYPOINTS.length),shootCD:0,stuckT:0,lastPos:sp.clone(),dying:false,deathT:0});
  });
  CT_SPAWNS.forEach(sp=>{
    const m=makeBot(false); m.position.copy(sp); scene.add(m);
    bots.push({mesh:m,isT:false,hp:100,alive:true,state:'wander',wpIdx:Math.floor(Math.random()*WAYPOINTS.length),shootCD:0,stuckT:0,lastPos:sp.clone(),dying:false,deathT:0});
  });
}

function killBot(b){
  if(!b.alive) return;
  b.alive=false; b.dying=true; b.deathT=4;
  killfeed(true, b.isT?'Terrorist':'Counter-Terrorist');
  hudScore(); checkEnd();
}

function updateBots(dt){
  const cp=controls.getObject().position;
  bots.forEach(b=>{
    if(!b.alive){
      if(b.dying){
        b.deathT-=dt;
        b.mesh.rotation.x=Math.min(b.mesh.rotation.x+dt*2.5,Math.PI/2);
        if(b.deathT<=0){
          scene.remove(b.mesh);
          b.mesh.traverse(c=>{if(c.isMesh){c.geometry.dispose();if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}});
          b.dying=false;
        }
      }
      return;
    }

    b.shootCD-=dt;
    const bp=b.mesh.position;
    const dp=bp.distanceTo(cp);
    let seePlayer=false;

    if(dp<BOT_DET&&isAlive){
      const dir=new THREE.Vector3().subVectors(cp,bp).normalize();
      botRC.set(bp.clone().add(new THREE.Vector3(0,1.4,0)),dir);
      botRC.far=dp+1;
      const wh=botRC.intersectObjects(mapMeshes,true);
      seePlayer=wh.length===0||wh[0].distance>dp*.9;
    }

    // enemy bot targeting
    let eBotTarget=null;
    bots.forEach(o=>{
      if(!o.alive||o===b||o.isT===b.isT)return;
      const d=bp.distanceTo(o.mesh.position);
      if(d<BOT_ATK&&(!eBotTarget||d<bp.distanceTo(eBotTarget.mesh.position))) eBotTarget=o;
    });

    if(seePlayer&&isAlive) b.state=dp<BOT_ATK?'attack':'chase';
    else if(eBotTarget) b.state='attack';
    else b.state='wander';

    if(b.state==='attack'){
      const tPos=seePlayer?cp:(eBotTarget?eBotTarget.mesh.position:cp);
      const lk=new THREE.Vector3().subVectors(tPos,bp);
      b.mesh.rotation.y=Math.atan2(lk.x,lk.z);
      if(b.shootCD<=0){
        b.shootCD=.38+Math.random()*.35;
        if(seePlayer&&isAlive){
          const acc=.14;
          const sd=lk.clone().normalize().add(new THREE.Vector3(rnd(-acc,acc),rnd(-acc,acc),rnd(-acc,acc)));
          botRC.set(bp.clone().add(new THREE.Vector3(0,1.4,0)),sd.normalize());
          botRC.far=50;
          const wh=botRC.intersectObjects(mapMeshes,true);
          const wd=wh.length?wh[0].distance:999;
          if(wd>dp*.9){ let dmg=14+rnd(0,9); if(playerAP>0){const abs=Math.min(playerAP,dmg*.5);playerAP-=abs;dmg-=abs;} playerHP=Math.max(0,playerHP-dmg); }
        } else if(eBotTarget){
          eBotTarget.hp-=22+rnd(0,8);
          if(eBotTarget.hp<=0) killBot(eBotTarget);
        }
      }
    } else if(b.state==='chase'){
      const look=new THREE.Vector3().subVectors(cp,bp).normalize(); look.y=0;
      b.mesh.rotation.y=Math.atan2(look.x,look.z);
      botRC.set(bp.clone().add(new THREE.Vector3(0,1,0)),look,0,3);
      const fh=botRC.intersectObjects(mapMeshes,true);
      if(!fh.length) bp.addScaledVector(look,BOT_SPD*dt);
      else {
        const lL=look.clone().applyAxisAngle(new THREE.Vector3(0,1,0),Math.PI/4);
        botRC.set(bp.clone().add(new THREE.Vector3(0,1,0)),lL,0,3);
        if(!botRC.intersectObjects(mapMeshes,true).length) bp.addScaledVector(lL,BOT_SPD*dt);
        else {
          const rR=look.clone().applyAxisAngle(new THREE.Vector3(0,1,0),-Math.PI/4);
          botRC.set(bp.clone().add(new THREE.Vector3(0,1,0)),rR,0,3);
          if(!botRC.intersectObjects(mapMeshes,true).length) bp.addScaledVector(rR,BOT_SPD*dt);
          else b.mesh.rotation.y+=Math.PI;
        }
      }
      const moved=bp.distanceTo(b.lastPos);
      if(moved<.01){ b.stuckT+=dt; if(b.stuckT>2){b.mesh.rotation.y+=Math.PI*(Math.random()>.5?1:-1);b.stuckT=0;} }
      else b.stuckT=0;
      b.lastPos.copy(bp);
    } else {
      const wp=WAYPOINTS[b.wpIdx];
      const tw=new THREE.Vector3().subVectors(wp,bp).normalize(); tw.y=0;
      b.mesh.rotation.y=Math.atan2(tw.x,tw.z);
      botRC.set(bp.clone().add(new THREE.Vector3(0,1,0)),tw,0,3);
      if(!botRC.intersectObjects(mapMeshes,true).length) bp.addScaledVector(tw,BOT_SPD*.55*dt);
      else b.wpIdx=Math.floor(Math.random()*WAYPOINTS.length);
      if(bp.distanceTo(wp)<2) b.wpIdx=Math.floor(Math.random()*WAYPOINTS.length);
    }

    // Snap to floor
    const fl=floorY(bp); if(bp.y<fl+.02) bp.y=fl+.02;
  });
}

// ═══════════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════════
function updatePlayer(dt){
  if(!isAlive||!gameActive) return;
  const obj=controls.getObject(), pos=obj.position;
  const fwd=new THREE.Vector3(); camera.getWorldDirection(fwd); fwd.y=0; fwd.normalize();
  const right=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();

  let mx=0,mz=0;
  if(keys['KeyW'])mz++;
  if(keys['KeyS'])mz--;
  if(keys['KeyA'])mx--;
  if(keys['KeyD'])mx++;
  moving=mx||mz;

  if(moving){
    const md=fwd.clone().multiplyScalar(mz).addScaledVector(right,mx).normalize();
    if(!wallHit(pos,md,.42)) pos.addScaledVector(md,MOVE_SPD*dt);
    else {
      const fp=fwd.clone().multiplyScalar(mz);
      if(!wallHit(pos,fp,.42)) pos.addScaledVector(fp,MOVE_SPD*.7*dt);
      const rp=right.clone().multiplyScalar(mx);
      if(!wallHit(pos,rp,.42)) pos.addScaledVector(rp,MOVE_SPD*.7*dt);
    }
  }

  if(keys['Space']&&canJump){vel.y=JUMP_STR;canJump=false;}
  vel.y-=GRAVITY*dt;
  pos.y+=vel.y*dt;
  const fl=floorY(pos);
  if(pos.y<fl+PLAYER_H){ pos.y=fl+PLAYER_H; vel.y=0; canJump=true; }

  if(moving&&canJump){
    bobT+=dt*6;
    camera.position.y=Math.sin(bobT)*.05;
    camera.position.x=Math.cos(bobT*.5)*.02;
  } else {
    camera.position.y*=.88; camera.position.x*=.88;
  }

  // Recoil recovery
  weaponGroup.position.lerp(WP_BASE,dt*5);
  weaponGroup.rotation.x+=(0-weaponGroup.rotation.x)*dt*10;

  // Muzzle
  if(muzzleT>0){ muzzleT-=dt; if(muzzleT<=0&&muzzleFlash)muzzleFlash.visible=false; }

  // Reload
  if(isReloading){ reloadT-=dt; if(reloadT<=0){ const n=Math.min(30-ammo.ak,ammo.akRes); ammo.ak+=n; ammo.akRes-=n; isReloading=false; hudAmmo(); } }

  // Plant hold
  if(holdPlant&&wIdx===4&&ammo.c4>0&&!bombPlanted){
    plantT+=dt;
    $('pp').style.display='block'; $('ppf').style.width=(plantT/3*100)+'%';
    $('bs').style.display='block'; $('bs').textContent=`PLANTING BOMB... ${(3-plantT).toFixed(1)}s`;
    if(plantT>=3){ plantBomb(pos.clone()); holdPlant=false; plantT=0; $('pp').style.display='none'; }
  } else { $('pp').style.display='none'; plantT=0; }

  // Bomb
  updateBomb(dt,pos);

  // HUD
  $('hpb').style.width=playerHP+'%'; $('apb').style.width=playerAP+'%';
  $('hpv').textContent=Math.floor(Math.max(0,playerHP));
  $('apv').textContent=Math.floor(Math.max(0,playerAP));

  if(playerHP<=0) die();
}

// ═══════════════════════════════════════════════════════
//  BOMB
// ═══════════════════════════════════════════════════════
function plantBomb(pos){
  bombPlanted=true; bombT=35; ammo.c4=0;
  bombMesh=makeC4(); bombMesh.position.copy(pos); bombMesh.position.y-=.8;
  bombMesh.rotation.x=-Math.PI/2; scene.add(bombMesh);
  killfeed(false,'💣 Bomb Planted');
  hudAmmo();
}

function updateBomb(dt,pos){
  if(!bombPlanted) return;
  bombT-=dt;
  bombBeepT-=dt;
  const interval=Math.max(.1,.8-(35-bombT)/35*.7);
  if(bombBeepT<=0){
    bombBeepT=interval;
    if(bombMesh){const l=bombMesh.getObjectByName('c4l');if(l){l.material.color.set(0xff9999);setTimeout(()=>{if(l)l.material.color.set(0xff2222);},100);}}
  }
  $('bs').style.display='block';
  const near=bombMesh&&pos.distanceTo(bombMesh.position)<2.5;
  if(near){
    if(keys['KeyF']){
      bombDefuseT+=dt;
      $('bs').textContent=`DEFUSING... ${(5-bombDefuseT).toFixed(1)}s`;
      if(bombDefuseT>=5){ bombDefused(); return; }
    } else {
      bombDefuseT=0;
      $('bs').textContent=`[F] DEFUSE | 💣 ${Math.max(0,bombT).toFixed(0)}s`;
    }
  } else {
    bombDefuseT=0;
    $('bs').textContent=`💣 BOMB: ${Math.max(0,bombT).toFixed(0)}s`;
  }
  if(bombT<=0) bombExplode();
}

function bombDefused(){
  bombPlanted=false; if(bombMesh){scene.remove(bombMesh);bombMesh=null;} $('bs').style.display='none';
  endRound('COUNTER-TERRORISTS WIN\nBomb Defused!');
}

function bombExplode(){
  const p=bombMesh?bombMesh.position.clone():new THREE.Vector3();
  bombPlanted=false; if(bombMesh){scene.remove(bombMesh);bombMesh=null;} $('bs').style.display='none';
  explodeHE(p); explodeHE(p.clone().add(new THREE.Vector3(2,0,1)));
  bots.forEach(b=>{if(b.alive&&b.mesh.position.distanceTo(p)<18)killBot(b);});
  if(controls.getObject().position.distanceTo(p)<18){ playerHP=0; }
  endRound('TERRORISTS WIN\nBomb Exploded!');
}

// ═══════════════════════════════════════════════════════
//  ROUND
// ═══════════════════════════════════════════════════════
function checkEnd(){
  const tA=bots.filter(b=>b.isT&&b.alive).length+(isAlive?1:0);
  const ctA=bots.filter(b=>!b.isT&&b.alive).length;
  if(tA===0&&!bombPlanted) endRound('COUNTER-TERRORISTS WIN');
  else if(ctA===0) endRound('TERRORISTS WIN');
}

function endRound(msg){
  if(!roundActive) return;
  roundActive=false;
  const ro=$('ro'); ro.textContent=msg; ro.style.display='block';
  roundOverT=5;
  if($('rmsg')){$('rmsg').textContent=msg;$('rmsg').style.display='block';}
}

function startRound(){
  roundTime=115; roundActive=true;
  bombPlanted=false; bombT=35;
  if(bombMesh){scene.remove(bombMesh);bombMesh=null;}
  $('bs').style.display='none'; $('ro').style.display='none';
  ammo={ak:30,akRes:90,he:2,smoke:2,mol:1,c4:1};
  playerHP=100; playerAP=100;
  const sp=T_SPAWNS[0];
  controls.getObject().position.set(sp.x,sp.y+PLAYER_H,sp.z);
  vel.set(0,0,0); canJump=false;
  spawnBots(); hudScore(); switchWeapon(0);
  $('dmsg').style.display='none'; $('rmsg').style.display='none';
}

function updateRound(dt){
  if(!roundActive){
    if(roundOverT>0){ roundOverT-=dt; if(roundOverT<=0){
      startRound();
      if(!isAlive){ isAlive=true;gameActive=true;$('menu').style.display='none';$('hud').style.display='block';controls.lock(); }
    }}
    return;
  }
  roundTime=Math.max(0,roundTime-dt);
  const m=Math.floor(roundTime/60), s=Math.floor(roundTime%60);
  $('rt').textContent=`${m}:${s<10?'0'+s:s}`;
  if(roundTime===0) endRound('TIME OVER – Counter-Terrorists Win');
}

// ═══════════════════════════════════════════════════════
//  HUD helpers
// ═══════════════════════════════════════════════════════
function hudScore(){
  $('ta').textContent=bots.filter(b=>b.isT&&b.alive).length+(isAlive?1:0);
  $('ca').textContent=bots.filter(b=>!b.isT&&b.alive).length;
}

function killfeed(byPlayer,who){
  const kf=$('kf');
  const el=document.createElement('div'); el.className='ke';
  el.textContent=byPlayer?`You ➜ ${who}`:`${who} ➜ You`;
  kf.appendChild(el);
  setTimeout(()=>{el.classList.add('fade');setTimeout(()=>el.remove(),700);},4500);
  while(kf.children.length>7) kf.removeChild(kf.firstChild);
}

// ═══════════════════════════════════════════════════════
//  RADAR
// ═══════════════════════════════════════════════════════
const radarCanvas=$('rc'), rctx=radarCanvas.getContext('2d');

function drawRadar(){
  rctx.clearRect(0,0,160,160);
  const cx=80,cy=80, ang=-camera.rotation.y;
  const pp2=controls.getObject().position;
  rctx.save(); rctx.translate(cx,cy); rctx.rotate(ang);
  bots.forEach(b=>{
    if(!b.alive)return;
    const dx=(b.mesh.position.x-pp2.x)*2, dz=(b.mesh.position.z-pp2.z)*2;
    if(Math.abs(dx)>79||Math.abs(dz)>79) return;
    rctx.fillStyle=b.isT?'#ff4444':'#4488ff';
    rctx.beginPath(); rctx.arc(dx,dz,3.5,0,Math.PI*2); rctx.fill();
  });
  if(bombMesh&&bombPlanted){
    const dx=(bombMesh.position.x-pp2.x)*2, dz=(bombMesh.position.z-pp2.z)*2;
    rctx.fillStyle='#ffcc00'; rctx.font='bold 12px monospace';
    rctx.fillText('✕',dx-5,dz+5);
  }
  rctx.restore();
  rctx.save(); rctx.translate(cx,cy); rctx.fillStyle='#00ff55';
  rctx.beginPath(); rctx.moveTo(0,-8); rctx.lineTo(-5,6); rctx.lineTo(5,6); rctx.closePath(); rctx.fill();
  rctx.restore();
}

// ═══════════════════════════════════════════════════════
//  DEATH
// ═══════════════════════════════════════════════════════
function die(){
  if(!isAlive)return;
  isAlive=false;gameActive=false;
  controls.unlock();
  setTimeout(()=>{
    $('dmsg').style.display='block';
    $('hud').style.display='none';
    $('menu').style.display='flex';
    checkEnd();
  },200);
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(!isAlive||!gameActive)return;
  if(e.code==='KeyR')reload();
  if(e.code==='Digit1')switchWeapon(0);
  if(e.code==='Digit2')switchWeapon(1);
  if(e.code==='Digit3')switchWeapon(2);
  if(e.code==='Digit4')switchWeapon(3);
  if(e.code==='Digit5')switchWeapon(4);
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  // If not locked yet but game is active, re-lock
  if(!controls.isLocked && isAlive && gameActive){
    controls.lock(); return;
  }
  if(!isAlive||!gameActive||!controls.isLocked)return;
  if(wIdx===4) holdPlant=true;
  else shoot();
});
canvas.addEventListener('mouseup',e=>{if(e.button===0){holdPlant=false;plantT=0;}});

$('joinBtn').addEventListener('click',()=>{
  $('menu').style.display='none'; $('hud').style.display='block';
  isAlive=true; gameActive=true;
  if(!roundActive) startRound();
  else { playerHP=100;playerAP=100;const sp=T_SPAWNS[0];controls.getObject().position.set(sp.x,sp.y+PLAYER_H,sp.z);vel.set(0,0,0); switchWeapon(0); }
  controls.lock();
});

// Show "click to resume" overlay when pointer is unlocked mid-game
const resumeHint = document.createElement('div');
resumeHint.id='resumeHint';
resumeHint.style.cssText='position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:150;background:rgba(0,0,0,.5);color:#ffcc00;font-size:22px;letter-spacing:4px;cursor:pointer;';
resumeHint.textContent='🖱 CLICK TO RESUME';
document.body.appendChild(resumeHint);
resumeHint.addEventListener('click',()=>{ controls.lock(); });

controls.addEventListener('lock',()=>{
  $('menu').style.display='none';
  resumeHint.style.display='none';
});
controls.addEventListener('unlock',()=>{
  if(isAlive && gameActive){
    // Just paused, show resume hint instead of going to menu
    resumeHint.style.display='flex';
  }
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  if(gameActive&&isAlive){ updatePlayer(dt); }
  updateBots(dt);
  updateGrenades(dt);
  updateFires(dt);
  updateParticles(dt);
  updateRound(dt);
  if(isAlive&&gameActive) drawRadar();
  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
loadMap();
animate();
</script>
